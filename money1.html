<!DOCTYPE html>
<html lang="zh-TW">
<head>

  <title>贊助說明 - 手動轉帳</title>
  <style>
    body {
      margin: 0;
      background-color: #fdf6e3;
      font-family: "微軟正黑體", sans-serif;
      font-size: 16px; /* 基礎字體加大 */
      padding: 10px;
    }
    .container {
      width: 95%; /* 手機版寬度 */
      max-width: 500px;
      margin: 20px auto;
      padding: 20px;
      box-sizing: border-box;
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
      font-size: 22px;
      text-align: center;
      margin: 10px 0 20px;
      color:#C60000;
      text-shadow:1px 1px 2px #FFAAAA;
    }
    .section {
      margin-bottom: 15px;
      background-color: #fcfcfc;
      padding: 12px;
      border-radius: 8px;
      border-left: 5px solid #C60000;
    }
    .section-title {
      font-weight: bold;
      color: #C60000;
      font-size: 18px;
      margin-bottom: 8px;
    }
    .section-content {
      font-size: 15px;
      color: #333;
      line-height: 1.7;
    }
    .copy-text {
      color: #0056b3;
      font-weight: bold;
      background: #eef5ff;
      padding: 2px 5px;
      border-radius: 4px;
    }
    /* 綠色 Line 客服按鈕 */
    .line-button {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      background-color: #06C755;
      color: #fff !important;
      text-align: center;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .line-button:hover {
      background-color: #05a647;
    }
  </style>
</head>
